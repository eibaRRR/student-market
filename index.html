<!DOCTYPE html>
<html lang="fr" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0047FF" />
  <meta name="description"
    content="StudentMarket : la marketplace P2P pour étudiants à Tanger. Achetez, vendez et échangez livres, électronique, vêtements et services en toute sécurité." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="StudentMarket | Neo-Digitalism" />
  <meta property="og:description"
    content="La marketplace immersive de l'écosystème universitaire : achats, ventes, services et zones sécurisées sur le campus." />
  <meta property="og:image" content="/tangier_satellite_map_dark_1777058968951.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>StudentMarket | Neo-Digitalism</title>
  <!-- Fonts: Inter for functional, Outfit for massive headers -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
</head>

<body
  class="bg-[#050505] text-white font-sans antialiased h-screen w-screen flex overflow-hidden selection:bg-[#0047FF] selection:text-white">

  <!-- Sidebar Navigation (desktop only) -->
  <aside id="sidebar"
    class="hidden md:flex w-20 hover:w-64 transition-all duration-300 ease-out flex-col glass-panel border-r border-white/5 z-50 overflow-hidden relative shrink-0">
    <div class="h-20 w-full flex items-center px-4 mt-4 cursor-pointer" onclick="window.router.navigate('home')"
      role="button" aria-label="Accueil StudentMarket" tabindex="0">
      <div
        class="w-12 h-12 rounded-xl bg-gradient-to-br from-[#0047FF] to-[#8000FF] flex items-center justify-center shrink-0 shadow-[0_0_20px_rgba(0,71,255,0.5)]">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
      </div>
      <span
        class="text-xl font-display font-bold ml-4 whitespace-nowrap opacity-0 transition-opacity duration-300">SMarket</span>
    </div>

    <nav class="flex-1 w-full mt-10 flex flex-col gap-4 px-4">
      <button id="open-search-btn" aria-label="Rechercher (Cmd+K)"
        class="w-full h-12 flex items-center rounded-2xl hover:bg-white/5 text-slate-400 hover:text-white transition-all overflow-hidden shrink-0">
        <div class="w-12 h-12 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </div>
        <span class="ml-2 font-semibold whitespace-nowrap opacity-0 transition-opacity">Rechercher</span>
        <kbd class="ml-auto mr-3 hidden md:inline-flex items-center gap-1 text-[10px] text-white/30 font-mono opacity-0 transition-opacity">⌘K</kbd>
      </button>
      <button id="chatbot-sidebar-toggle" aria-label="Ouvrir l'assistant MIGO"
        class="w-full h-12 flex items-center rounded-2xl hover:bg-white/5 text-slate-400 hover:text-white transition-all overflow-hidden shrink-0">
        <div class="w-12 h-12 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
            </path>
          </svg>
        </div>
        <span class="ml-2 font-semibold whitespace-nowrap opacity-0 transition-opacity">Assistant</span>
      </button>
      <button onclick="window.router.navigate('catalog')" aria-label="Voir le catalogue"
        class="w-full h-12 flex items-center rounded-2xl hover:bg-white/5 text-slate-400 hover:text-white transition-all overflow-hidden shrink-0">
        <div class="w-12 h-12 flex items-center justify-center shrink-0">
          <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
            </path>
          </svg>
        </div>
        <span class="ml-2 font-semibold whitespace-nowrap opacity-0 transition-opacity">Catalogue</span>
      </button>
      <button id="open-notifications-btn" aria-label="Ouvrir les notifications"
        class="relative w-full h-12 flex items-center rounded-2xl hover:bg-white/5 text-slate-400 hover:text-white transition-all overflow-hidden shrink-0">
        <div class="w-12 h-12 flex items-center justify-center shrink-0 relative">
          <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
            </path>
          </svg>
          <span id="notif-count-badge"
            class="hidden absolute top-2 right-2 min-w-[18px] h-[18px] px-1 bg-red-500 text-white text-[10px] font-bold rounded-full flex items-center justify-center shadow-lg shadow-red-500/40 ring-2 ring-[#0a0a0a]">0</span>
        </div>
        <span class="ml-2 font-semibold whitespace-nowrap opacity-0 transition-opacity">Notifications</span>
      </button>
    </nav>

    <!-- Trends Section -->
    <div class="mt-auto px-4 mb-8">
      <div class="text-[10px] font-black text-white/20 uppercase tracking-[0.3em] mb-6 opacity-0 transition-opacity duration-300" id="trends-label">Trends</div>
      <div class="flex flex-col gap-5">
        <!-- Trend 1 -->
        <div class="flex items-center gap-3 cursor-pointer group/trend" onclick="window.router.navigate('details', { id: 'ad1' })">
          <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/5 flex items-center justify-center shrink-0 overflow-hidden group-hover/trend:border-primary-500/50 transition-all">
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&q=80&w=100" class="w-full h-full object-cover opacity-60 group-hover/trend:opacity-100 transition-opacity" alt="">
          </div>
          <div class="opacity-0 transition-opacity duration-300 overflow-hidden trends-text">
            <p class="text-[11px] font-bold text-white truncate w-32">Macbook Pro M1</p>
            <p class="text-[9px] text-[#0047FF] font-black uppercase tracking-tighter">Hot Listing 🔥</p>
          </div>
        </div>
        <!-- Trend 2 -->
        <div class="flex items-center gap-3 cursor-pointer group/trend" onclick="window.router.navigate('catalog', { category: 'Services' })">
          <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/5 flex items-center justify-center shrink-0 overflow-hidden group-hover/trend:border-[#8000FF]/50 transition-all">
             <img src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&q=80&w=100" class="w-full h-full object-cover opacity-60 group-hover/trend:opacity-100 transition-opacity" alt="">
          </div>
          <div class="opacity-0 transition-opacity duration-300 overflow-hidden trends-text">
            <p class="text-[11px] font-bold text-white truncate w-32">Tutorat Maths</p>
            <p class="text-[9px] text-[#8000FF] font-black uppercase tracking-tighter">New Service 🚀</p>
          </div>
        </div>
      </div>
    </div>

    <div id="auth-sidebar-container" class="w-full mb-8 px-4 flex flex-col gap-4">
      <!-- Injected via JS -->
    </div>
  </aside>

  <!-- Main Content Canvas -->
  <div class="flex-1 h-screen overflow-y-auto relative mesh-bg animate-mesh scroll-smooth">
    <!-- Top mobile bar -->
    <header
      class="md:hidden sticky top-0 z-40 flex items-center justify-between px-4 py-3 glass-panel border-b border-white/5">
      <button onclick="window.router.navigate('home')" aria-label="Accueil" class="flex items-center gap-2">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-[#0047FF] to-[#8000FF] flex items-center justify-center shadow-[0_0_15px_rgba(0,71,255,0.5)]">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <span class="text-base font-display font-bold">SMarket</span>
      </button>
      <div class="flex items-center gap-2">
        <button id="open-search-btn-mobile" aria-label="Rechercher"
          class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
        <button id="open-notifications-btn-mobile" aria-label="Notifications"
          class="relative w-10 h-10 rounded-xl bg-white/5 hover:bg-white/10 flex items-center justify-center text-white transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
            </path>
          </svg>
          <span id="notif-count-badge-mobile"
            class="hidden absolute top-1 right-1 min-w-[16px] h-[16px] px-1 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center shadow-lg ring-2 ring-[#0a0a0a]">0</span>
        </button>
      </div>
    </header>
    <main id="app-container" class="w-full min-h-full pb-28 md:pb-20">
      <!-- Vues TS injectées ici -->
    </main>
  </div>

  <!-- Mobile Bottom Nav -->
  <nav id="mobile-bottom-nav"
    class="md:hidden fixed bottom-0 left-0 right-0 z-40 glass-panel border-t border-white/5 px-2 pt-2 pb-[calc(env(safe-area-inset-bottom)+0.5rem)] flex items-center justify-around">
    <button onclick="window.router.navigate('home')" aria-label="Accueil"
      class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/>
      </svg>
      <span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
    </button>
    <button onclick="window.router.navigate('catalog')" aria-label="Catalogue"
      class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
      </svg>
      <span class="text-[10px] font-bold uppercase tracking-wider">Catalogue</span>
    </button>
    <button onclick="window.router.navigate('student', { tab: 'publish' })" aria-label="Publier"
      class="-mt-6 w-14 h-14 rounded-2xl bg-gradient-to-br from-[#0047FF] to-[#8000FF] text-white shadow-[0_10px_30px_rgba(0,71,255,0.4)] flex items-center justify-center">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
      </svg>
    </button>
    <button id="chatbot-sidebar-toggle-mobile" aria-label="Assistant MIGO"
      class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
      </svg>
      <span class="text-[10px] font-bold uppercase tracking-wider">MIGO</span>
    </button>
    <button id="mobile-nav-profile" onclick="window.router.navigate('student')" aria-label="Profil"
      class="flex flex-col items-center gap-0.5 px-3 py-2 rounded-xl text-white/60 hover:text-white hover:bg-white/5 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span class="text-[10px] font-bold uppercase tracking-wider">Profil</span>
    </button>
  </nav>

  <!-- Fullscreen Search Overlay -->
  <div id="search-overlay"
    class="fixed inset-0 z-[100] bg-[#050505]/80 backdrop-blur-3xl hidden flex flex-col items-center pt-20 md:pt-32 px-4 transition-all"
    role="dialog" aria-modal="true" aria-label="Recherche">
    <button id="close-search-overlay" aria-label="Fermer la recherche"
      class="absolute top-6 right-6 md:top-10 md:right-10 text-white/50 hover:text-white">
      <svg class="w-8 h-8 md:w-10 md:h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
    <input type="text" id="overlay-search-input"
      class="w-full max-w-4xl bg-transparent border-b-2 border-white/20 text-3xl md:text-6xl font-display font-bold text-white placeholder-white/20 focus:outline-none focus:border-[#0047FF] pb-4 transition-colors"
      placeholder="Que cherchez-vous ?" autocomplete="off">
    <div class="w-full max-w-4xl mt-8 md:mt-12 flex flex-wrap gap-2 md:gap-4 text-white/50 text-sm md:text-lg" id="search-suggestions">
      <span class="bg-white/5 px-4 py-2 rounded-full cursor-pointer hover:text-white hover:bg-white/10" data-q="Macbook">#Macbook</span>
      <span class="bg-white/5 px-4 py-2 rounded-full cursor-pointer hover:text-white hover:bg-white/10" data-q="Ipad Pro">#Ipad Pro</span>
      <span class="bg-white/5 px-4 py-2 rounded-full cursor-pointer hover:text-white hover:bg-white/10" data-q="Livres">#Livres</span>
      <span class="bg-white/5 px-4 py-2 rounded-full cursor-pointer hover:text-white hover:bg-white/10" data-q="Tutorat">#Tutorat</span>
      <span class="bg-white/5 px-4 py-2 rounded-full cursor-pointer hover:text-white hover:bg-white/10" data-q="Vêtements">#Vêtements</span>
    </div>
    <p class="mt-6 text-[10px] uppercase tracking-[0.3em] text-white/30">Astuce : <kbd class="px-2 py-1 rounded bg-white/5 border border-white/10 text-white/70 mx-1">⌘ K</kbd> ou <kbd class="px-2 py-1 rounded bg-white/5 border border-white/10 text-white/70 mx-1">/</kbd> pour ouvrir • <kbd class="px-2 py-1 rounded bg-white/5 border border-white/10 text-white/70 mx-1">Esc</kbd> pour fermer</p>
  </div>

  <!-- Notifications Drawer -->
  <div id="notifications-drawer"
    class="fixed inset-0 z-[95] hidden" role="dialog" aria-modal="true" aria-label="Notifications">
    <div id="notifications-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <aside
      class="absolute right-0 top-0 bottom-0 w-full sm:w-[420px] glass-panel border-l border-white/10 flex flex-col shadow-2xl">
      <div class="p-5 border-b border-white/5 flex items-center justify-between">
        <div>
          <h3 class="text-lg font-display font-bold text-white">Notifications</h3>
          <p class="text-[10px] text-white/40 uppercase tracking-widest mt-0.5">Activité récente</p>
        </div>
        <div class="flex items-center gap-2">
          <button id="notif-mark-all" class="text-[10px] uppercase tracking-widest text-white/50 hover:text-white px-2 py-1 rounded-md hover:bg-white/5 transition-colors">Tout lu</button>
          <button id="notif-clear" class="text-[10px] uppercase tracking-widest text-white/50 hover:text-red-400 px-2 py-1 rounded-md hover:bg-white/5 transition-colors">Vider</button>
          <button id="close-notifications-drawer" aria-label="Fermer" class="w-9 h-9 rounded-full bg-white/5 hover:bg-white/10 flex items-center justify-center text-white/60 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>
      <div id="notifications-list" class="flex-1 overflow-y-auto p-3 space-y-2">
        <!-- injected by JS -->
      </div>
    </aside>
  </div>

  <!-- Floating Action Menu (Speed Dial) — desktop only -->
  <div id="fab-container" class="hidden md:flex fixed bottom-10 right-10 z-40 flex-col-reverse items-end gap-4 group">
    <button aria-label="Ouvrir le menu d'actions rapides"
      class="w-16 h-16 bg-gradient-to-tr from-[#0047FF] to-[#00FFFF] rounded-full shadow-[0_0_30px_rgba(0,71,255,0.6)] flex items-center justify-center text-white hover:scale-110 transition-transform animate-pulse peer">
      <svg class="w-8 h-8 transition-transform duration-300 group-hover:rotate-45" fill="none" stroke="currentColor"
        viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
    </button>

    <!-- Speed Dial Actions -->
    <div
      class="flex flex-col items-end gap-3 opacity-0 translate-y-4 pointer-events-none group-hover:opacity-100 group-hover:translate-y-0 group-hover:pointer-events-auto transition-all duration-300 mb-2">

      <!-- Action 1: Vendre -->
      <div class="flex items-center gap-3">
        <span
          class="text-white bg-[#050505]/80 backdrop-blur-md px-3 py-1.5 rounded-lg text-sm font-semibold border border-white/10 shadow-lg">Vendre
          un objet</span>
        <button onclick="window.router.navigate('student', { tab: 'publish' })" aria-label="Publier une annonce"
          class="w-12 h-12 bg-white/5 hover:bg-[#0047FF] border border-white/20 rounded-full flex items-center justify-center text-white transition-all shadow-lg hover:shadow-[0_0_20px_rgba(0,71,255,0.8)] shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
          </svg>
        </button>
      </div>

      <!-- Action 2: Chercher -->
      <div class="flex items-center gap-3">
        <span
          class="text-white bg-[#050505]/80 backdrop-blur-md px-3 py-1.5 rounded-lg text-sm font-semibold border border-white/10 shadow-lg">Recherche
          Avancée</span>
        <button id="fab-search-btn" aria-label="Recherche avancée"
          class="w-12 h-12 bg-white/5 hover:bg-[#8000FF] border border-white/20 rounded-full flex items-center justify-center text-white transition-all shadow-lg hover:shadow-[0_0_20px_rgba(128,0,255,0.8)] shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Toast Notifications Container -->
  <div id="toast-container" class="fixed bottom-24 md:bottom-5 right-5 z-[120] flex flex-col gap-2"></div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
